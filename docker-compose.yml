networks:
  web:
    external: true
  internal:
    external: false

services:
   photo_madsnorgaard_db:
     image: mysql:8.0
     volumes:
       - ./wordpress.sql:/docker-entrypoint-initdb.d/init.sql # prepopulate database
       - db_data:/var/lib/mysql # persist database data inside docker storage
     restart: always
     env_file:
      - .env
     environment:
      DOCKER_COMPOSE_YML_LOCATION: ${PWD}
     container_name: ${WORDPRESS_DOMAIN}_db
     networks:
      - internal
     labels:
      - traefik.enable=false


   photo_madsnorgaard_wordpress:
     depends_on:
       - photo_madsnorgaard_db
     image: wordpress:php8.4-apache
     restart: always
     environment:
       WORDPRESS_DB_HOST: photo_madsnorgaard_db:3306
       WORDPRESS_DB_USER: ${MYSQL_USER}
       WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
       WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
       DOCKER_COMPOSE_YML_LOCATION: ${PWD}
     volumes:
       - wp_html:/var/www/html
       - ./wp-content:/var/www/html/wp-content
       - ./php-uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
     container_name: ${WORDPRESS_DOMAIN}_wordpress
     labels:
       - traefik.http.routers.photo_madsnorgaard_wordpress.rule=Host(`${WORDPRESS_DOMAIN}`) || Host(`www.${WORDPRESS_DOMAIN}`)
       - traefik.http.routers.photo_madsnorgaard_wordpress.tls=true
       - traefik.http.routers.photo_madsnorgaard_wordpress.tls.certresolver=lets-encrypt
       # Per-service CSP — WordPress needs unsafe-inline/unsafe-eval for Gutenberg admin
       - "traefik.http.middlewares.photo-csp.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://analytics.theazanianprepper.online; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://analytics.theazanianprepper.online; media-src 'self' https:; frame-src 'self' https:; frame-ancestors 'self'; base-uri 'self'; upgrade-insecure-requests"
       - "traefik.http.routers.photo_madsnorgaard_wordpress.middlewares=photo-csp"
     networks:
       - internal
       - web

   cli:
     image: wordpress:cli-php8.4
     user: "33:33"
     container_name: ${WORDPRESS_DOMAIN}_cli
     env_file: .env
     environment:
       WORDPRESS_DB_HOST: photo_madsnorgaard_db:3306
       WORDPRESS_DB_USER: "${MYSQL_USER}"
       WORDPRESS_DB_PASSWORD: "${MYSQL_PASSWORD}"
       WORDPRESS_DB_NAME: "${MYSQL_DATABASE}"
     volumes:
       - wp_html:/var/www/html
       - ./wp-content:/var/www/html/wp-content
     networks:
       - internal
     depends_on:
       - photo_madsnorgaard_db
     profiles:
       - cli

volumes:
    db_data: {}
    wp_html: {}
